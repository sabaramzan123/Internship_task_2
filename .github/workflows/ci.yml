name: "02 - Continuous Integration Pipeline"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─── JOB 1: Terraform Static Linting ────────────────────────────
  terraform:
    name: "Static IaC Validation"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout Codebase"
        uses: actions/checkout@v4

      - name: "Initialize Terraform Engine"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"

      - name: "Enforce Design Syntax Linting"
        run: terraform -chdir=infra/terraform fmt -check

      - name: "Execute Dry-Run Initializer"
        run: terraform -chdir=infra/terraform init -backend=false

      - name: "Execute Structural Blueprint Validation"
        run: terraform -chdir=infra/terraform validate

  # ─── JOB 2: Frontend Lint + Unit Tests ──────────────────────────
  frontend-tests:
    name: "Frontend Lint & Unit Tests"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout Codebase"
        uses: actions/checkout@v4

      - name: "Setup Node.js Runtime"
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: Frontend/package-lock.json

      - name: "Install Frontend Dependencies"
        working-directory: Frontend
        run: npm ci

      - name: "Run ESLint Static Analysis"
        working-directory: Frontend
        run: npm run lint

      - name: "Run Frontend Unit Test Suite"
        working-directory: Frontend
        run: npm run test:ci

      - name: "Upload Frontend Coverage Report"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: Frontend/coverage/
          retention-days: 7

  # ─── JOB 3: Backend Lint + Unit Tests ───────────────────────────
  backend-tests:
    name: "Backend Lint & Unit Tests"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout Codebase"
        uses: actions/checkout@v4

      - name: "Setup Python Runtime"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: "Install Backend Dependencies"
        working-directory: backend
        run: pip install -r requirements.txt pytest httpx

      - name: "Run Ruff Static Linter"
        working-directory: backend
        run: |
          pip install ruff
          ruff check . --output-format=github || true

      - name: "Run Backend Unit Test Suite"
        working-directory: backend
        run: pytest test_main.py -v --tb=short

      - name: "Upload Backend Test Results"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/.pytest_cache/
          retention-days: 7

  # ─── JOB 4: Container Build Validation ──────────────────────────
  containers:
    name: "Multi-Service Container Validation"
    runs-on: ubuntu-latest
    needs: [frontend-tests, backend-tests]

    steps:
      - name: "Checkout Codebase"
        uses: actions/checkout@v4

      - name: "Validate Local Compose Infrastructure Blueprint"
        run: docker compose config

      - name: "Dry-Run Frontend Container Build"
        run: docker build ./Frontend

      - name: "Dry-Run Deep Recon Backend Container Build"
        run: docker build ./backend

  # ─── JOB 5: Pipeline Status Summary ────────────────────────────
  pipeline-summary:
    name: "Pipeline Status Report"
    runs-on: ubuntu-latest
    needs: [terraform, frontend-tests, backend-tests, containers]
    if: always()

    steps:
      - name: "Generate Pipeline Execution Summary"
        run: |
          echo "## 🔍 AetherRecon CI Pipeline Report" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** \`${{ github.event_name }}\` on branch \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Actor:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Static IaC Validation | ${{ needs.terraform.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Lint & Tests | ${{ needs.frontend-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Lint & Tests  | ${{ needs.backend-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Container Builds      | ${{ needs.containers.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pipeline completed at:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
